<!DOCTYPE html>
<html lang="en" data-skin="jewels">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BindRune Editor — Synchronicity Engine</title>
    <meta name="description" content="Create personal bind runes — combine Elder Futhark runes into unified symbols of intention. Part of the Synchronicity Engine." />
    <meta property="og:title" content="BindRune Editor" />
    <meta property="og:description" content="Combine Elder Futhark runes into a personal sigil of intention." />
    <meta property="og:url" content="https://rune.syncengine.earth" />
    <meta property="og:type" content="website" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Noto+Sans+Runic&family=Outfit:wght@300..800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="/Logo.svg" />
    <link rel="apple-touch-icon" href="/Logo.svg" />
    <meta property="og:image" content="https://rune.syncengine.earth/Logo.png" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com;" />

  <body>
    <div id="app">
      <header id="toolbar"></header>
      <div id="intention-bar">
        <textarea id="intention-input" placeholder="Write your manifestation intention..." rows="1" maxlength="2000"></textarea>
      </div>
      <main id="workspace">
        <aside id="sidebar-left"></aside>
        <section id="canvas-container"></section>
        <aside id="sidebar-right"></aside>
      </main>
      <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    </div>
    <script src="/theme-engine.js"></script>
    <script>
      ThemeEngine.init({
        defaultSkin: 'jewels',
        storageKey: 'bindrune-skin',
        skins: ['jewels', 'organic', 'runestone', 'midnight', 'contemplative', 'technical']
      });
    </script>
    <script type="module" src="/src/main.ts"></script>

</html>
